name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy.yml"

env:
  IMAGE_NAME: ${{ github.repository_owner }}/illume-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker stop illume-server || true
            docker rm illume-server || true
            docker run -d \
              --name illume-server \
              --network illume-net \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /root/illume.env \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker stop illume-worker || true
            docker rm illume-worker || true
            docker run -d \
              --name illume-worker \
              --network illume-net \
              --restart unless-stopped \
              --env-file /root/illume.env \
              ghcr.io/${{ env.IMAGE_NAME }}:latest \
              celery -A app.core.celery worker --loglevel=info
